services:
  fastapi_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple_rag_app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    
    environment:
      - SIMPLE_RAG_DATABASE_URL=/app/data/embeddings_cache.db
      - SIMPLE_RAG_UVICORN_HOST=0.0.0.0
    
    volumes:
      - sqlite_data:/app/data
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  sqlite_data:
    driver: local